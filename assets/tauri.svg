<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="branchGradient" x1="200" y1="200" x2="824" y2="824">
      <stop offset="0%" stop-color="#3DA5FF"/>
      <stop offset="50%" stop-color="#A56EFF"/>
      <stop offset="100%" stop-color="#FF5B9F"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#020B2A"/>

  <!-- Branch lines -->
  <g stroke="url(#branchGradient)"
     stroke-width="42"
     stroke-linecap="round"
     stroke-linejoin="round"
     fill="none"
     filter="url(#glow)">

    <!-- Left branch -->
    <path d="
      M 512 720
      C 470 680, 390 650, 320 620
      C 250 590, 220 540, 220 470
      L 220 370
    "/>

    <!-- Center branch -->
    <path d="
      M 512 720
      L 512 330
    "/>

    <!-- Right branch -->
    <path d="
      M 512 720
      C 554 680, 634 650, 704 620
      C 774 590, 804 540, 804 470
      L 804 370
    "/>

    <!-- Bottom stem -->
    <path d="
      M 512 820
      L 512 720
    "/>
  </g>

  <!-- Top nodes -->
  <g fill="#020B2A" stroke="url(#branchGradient)" stroke-width="42">
    <circle cx="220" cy="300" r="70"/>
    <circle cx="512" cy="260" r="70"/>
    <circle cx="804" cy="300" r="70"/>
  </g>

  <!-- Center node -->
  <circle
    cx="512"
    cy="720"
    r="82"
    fill="url(#branchGradient)"
    filter="url(#glow)"
  />

  <!-- Center highlight -->
  <circle
    cx="512"
    cy="720"
    r="34"
    fill="#FFFFFF"
  />
</svg>